<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do u love me?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: block;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            height: 100vh;
            position: relative;
        }
        .container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
        }
        .gif-container img {
            width: 150px;
            height: auto;
            margin-bottom: 10px;
        }
        h1 {
            color: #d63031;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .btn-wrapper {
            position: relative;
            height: 150px;
            width: 100%;
        }
        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            position: absolute;
            left: 10%;
            top: 20px;
            z-index: 10;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            right: 10%;
            top: 20px;
            transition: all 0.1s ease;
            z-index: 100;
            touch-action: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">
            <!-- ချစ်စရာ ကောင်းတဲ့ စိတ်ဆိုးနေတဲ့ ကြောင်လှုပ်လှုပ်လေး -->
            <img id="catImg" src="https://media.tenor.com/w1-g6kWgT70AAAAi/mochi-mochi-peach-cat-peach-cat.gif" alt="cat">
        </div>
        <h1 id="question">Wait... are you sure?</h1>
        <div id="emojiSection" class="emoji">🥺</div>
        
        <div class="btn-wrapper">
            <button id="yesBtn" onclick="selectYes()">YES ❤️</button>
            <button id="noBtn" ontouchstart="moveNoButton(event)" onmouseover="moveNoButton(event)" onclick="moveNoButton(event)">NO</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const yesBtn = document.getElementById('yesBtn');
        const catImg = document.getElementById('catImg');
        const emojiSection = document.getElementById('emojiSection');

        function moveNoButton(e) {
            // ဖုန်းမှာ နှိပ်ရင်လည်း Page က တခြားဟာတွေ လျှောက်မလုပ်အောင် ပိတ်တာ
            if(e) e.preventDefault(); 
            
            // Screen တစ်ခုလုံးရဲ့ အကျယ်အဝန်းထဲကနေ လျှောက်ပြေးခိုင်းတာ
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            
            // ခလုတ်ကို wrapper ထဲကနေ ဆွဲထုတ်ပြီး body ရဲ့ ကြိုက်တဲ့နေရာ ပို့လိုက်တာ
            document.body.appendChild(noBtn);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            question.innerHTML = "Yeayyy! I Love You Too! 💖😘";
            emojiSection.innerHTML = "🥰✨";
            // YES နှိပ်ရင် ကြောင်လေး ကခုန်နေတဲ့ GIF ပြောင်းမယ်
            catImg.src = "https://media.tenor.com/9vM70v1766sAAAAi/mochi-peach.gif";
            
            if(document.getElementById('noBtn')) {
                document.getElementById('noBtn').style.display = 'none';
            }
            yesBtn.style.left = '50%';
            yesBtn.style.transform = 'translateX(-50%) scale(1.3)';
            yesBtn.style.top = '20px';
        }
    </script>

</body>
</html>
