<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do u love me?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
        }
        h1 {
            color: #d63031;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .gif-container {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">🐱</div>
        <h1 id="question">Wait... are you sure? 🥺</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="selectYes()">YES ❤️</button>
            <button id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()">NO</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const yesBtn = document.getElementById('yesBtn');

        // NO ခလုတ်ကို ထိလိုက်တာနဲ့ တခြားနေရာကို ပြေးခိုင်းတဲ့ Code
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // YES ခလုတ်ကို နှိပ်ရင် ပြမယ့်စာ
        function selectYes() {
            question.innerHTML = "Yeayyy! I Love You Too! 💖😘";
            noBtn.style.display = 'none'; // NO ခလုတ်ကို ဖျောက်လိုက်မယ်
            yesBtn.style.transform = 'scale(1.2)';
        }
    </script>

</body>
</html>
